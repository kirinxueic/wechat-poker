<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>德州扑克 Texas Hold'em</title>
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --felt: #1a6b3a;
  --felt-dark: #124d2a;
  --gold: #f0c040;
  --gold2: #d4a010;
  --card-bg: #fff;
  --red: #d93030;
  --black: #1a1a1a;
  --chip: #e8d080;
  --ui-bg: rgba(0,0,0,0.7);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d0d0d;
  font-family: 'Segoe UI', Arial, sans-serif;
  color: #fff;
  height: 100vh;
  overflow: hidden;
  display: flex; flex-direction: column;
}

/* ── 登录 ── */
#loginScreen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg,#0a2010,#0d1a30);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.login-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid #f0c04044;
  border-radius: 20px;
  padding: 40px 50px;
  text-align: center;
  min-width: 340px;
  backdrop-filter: blur(10px);
}
.login-box h1 { font-size: 2rem; color: var(--gold); margin-bottom: 8px; letter-spacing: 2px; }
.login-box p { color: #aaa; margin-bottom: 28px; }
.login-box input {
  width: 100%; padding: 12px 16px;
  background: rgba(255,255,255,0.1);
  border: 1px solid #555; border-radius: 8px;
  color: #fff; font-size: 15px; margin-bottom: 14px;
  outline: none; transition: border 0.2s;
}
.login-box input:focus { border-color: var(--gold); }
.login-box button {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg,var(--gold),var(--gold2));
  border: none; border-radius: 8px;
  color: #1a1a1a; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: opacity 0.2s;
}
.login-box button:hover { opacity: 0.85; }

/* ── 游戏主区域 ── */
#gameArea { display: none; flex: 1; flex-direction: column; }

/* ── 顶部信息栏 ── */
#topBar {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(0,0,0,0.8);
  padding: 8px 20px; border-bottom: 1px solid #333;
  flex-shrink: 0;
}
#topBar .room-info { color: #aaa; font-size: 13px; }
#topBar .room-info span { color: var(--gold); font-weight: 700; }
#topBar .phase-badge {
  background: var(--gold); color: #1a1a1a;
  font-weight: 700; font-size: 13px;
  padding: 4px 14px; border-radius: 20px; letter-spacing: 1px;
}
#startBtn {
  background: linear-gradient(135deg,#2ecc71,#27ae60);
  border: none; border-radius: 8px;
  color: #fff; font-size: 14px; font-weight: 700;
  padding: 8px 20px; cursor: pointer;
}
#startBtn:hover { opacity: 0.85; }
#startBtn:disabled { opacity: 0.4; cursor: not-allowed; }
#leaveBtn {
  background: linear-gradient(135deg,#e74c3c,#c0392b);
  border: none; border-radius: 8px;
  color: #fff; font-size: 14px; font-weight: 700;
  padding: 8px 16px; cursor: pointer; margin-left: 8px;
}
#leaveBtn:hover { opacity: 0.85; }

/* ── 牌桌区域 ── */
#tableWrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 10px; position: relative; overflow: hidden;
}
#table {
  position: relative;
  width: min(960px, 96vw);
  height: min(520px, 52vw, 70vh);
  background: radial-gradient(ellipse 80% 70% at 50% 50%, var(--felt), var(--felt-dark));
  border-radius: 50%;
  border: 10px solid #5a3a1a;
  box-shadow: 0 0 0 4px #3a2010, 0 0 50px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.3);
}

/* ── 底池 ── */
#potArea {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -60%);
  text-align: center; pointer-events: none;
}
#potLabel { color: #ddd; font-size: 12px; letter-spacing: 1px; }
#potAmount { color: var(--gold); font-size: 24px; font-weight: 700; text-shadow: 0 0 10px rgba(240,192,64,0.5); }

/* ── 公共牌区 ── */
#communityCards {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, 10%);
  display: flex; gap: 8px;
}

/* ── 赢家公告 ── */
#winnerBanner {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: rgba(0,0,0,0.92);
  border: 2px solid var(--gold);
  border-radius: 16px; padding: 14px 28px;
  text-align: center; display: none;
  min-width: 260px; z-index: 50;
}
#winnerBanner .win-title { color: var(--gold); font-size: 15px; font-weight: 700; margin-bottom: 6px; }
#winnerBanner .win-detail { color: #ddd; font-size: 13px; line-height: 1.8; }

/* ── 座位 ── */
.seat {
  position: absolute;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column; align-items: center;
  gap: 4px;
  transition: all 0.3s;
}
.seat .seat-card-row { display: flex; gap: 3px; }
.seat .seat-info {
  background: var(--ui-bg);
  border: 1px solid #444;
  border-radius: 10px;
  padding: 5px 10px;
  text-align: center;
  min-width: 80px;
  transition: border 0.2s, box-shadow 0.2s;
}
.seat .seat-name { font-size: 12px; color: #ddd; font-weight: 600; }
.seat .seat-chips { font-size: 13px; color: var(--gold); font-weight: 700; }
.seat .seat-bet { font-size: 11px; color: #aaa; min-height: 14px; }
.seat.active .seat-info {
  border-color: var(--gold);
  box-shadow: 0 0 12px rgba(240,192,64,0.5);
}
.seat.folded .seat-info { opacity: 0.45; }
.seat.folded .card { opacity: 0.3; filter: grayscale(1); }
.seat .dealer-btn {
  position: absolute; top: -10px; right: -10px;
  background: var(--gold); color: #1a1a1a;
  font-size: 10px; font-weight: 900;
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.seat .hand-name {
  font-size: 10px; color: #88ff88;
  background: rgba(0,80,0,0.7); border-radius: 4px;
  padding: 1px 5px;
}

/* ── 牌 ── */
.card {
  width: 38px; height: 54px;
  border-radius: 5px;
  background: var(--card-bg);
  border: 1px solid #bbb;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  box-shadow: 1px 2px 5px rgba(0,0,0,0.4);
  flex-direction: column; line-height: 1.1;
  user-select: none;
  transition: transform 0.2s;
}
.card:hover { transform: translateY(-3px); }
.card.red { color: var(--red); }
.card.black { color: var(--black); }
.card.back {
  background: linear-gradient(135deg,#1a3a8a,#0d2060);
  color: transparent;
  border: 1px solid #4060c0;
}
.card.back::after { content: '🂠'; font-size: 24px; filter: opacity(0.4); }
.card.community { width: 48px; height: 68px; font-size: 15px; }
.card-rank { font-size: 14px; }
.card-suit { font-size: 11px; }

/* ── 下方操作区 ── */
#actionArea {
  background: rgba(0,0,0,0.85);
  border-top: 1px solid #333;
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: center;
  gap: 12px; flex-shrink: 0; flex-wrap: wrap;
}
#actionArea .my-info {
  display: flex; gap: 20px; margin-right: 20px;
}
#actionArea .info-item { text-align: center; }
#actionArea .info-label { font-size: 11px; color: #888; }
#actionArea .info-val { font-size: 16px; font-weight: 700; color: var(--gold); }
.action-btn {
  padding: 10px 22px; border: none; border-radius: 8px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
  letter-spacing: 0.5px;
}
.action-btn:hover:not(:disabled) { transform: translateY(-2px); }
.action-btn:active:not(:disabled) { transform: translateY(0); }
.action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-fold { background: #8b2020; color: #fff; }
.btn-check { background: #2060b0; color: #fff; }
.btn-call { background: #1a7a3a; color: #fff; }
.btn-raise { background: #b07000; color: #fff; }
.btn-allin { background: linear-gradient(135deg,#c02020,#800000); color: #fff; }
#raiseInput {
  width: 90px; padding: 10px 10px;
  background: rgba(255,255,255,0.1);
  border: 1px solid #666; border-radius: 8px;
  color: #fff; font-size: 14px; text-align: center;
}
#waitMsg { color: #888; font-size: 14px; }

/* ── 玩家列表侧栏 ── */
#sidebar {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: 180px; background: rgba(0,0,0,0.85);
  border-right: 1px solid #333;
  display: flex; flex-direction: column;
  padding: 10px; overflow-y: auto; gap: 6px;
  z-index: 10;
}
#sidebar h3 { color: #888; font-size: 11px; letter-spacing: 1px; margin-bottom: 4px; }
.sidebar-player {
  background: rgba(255,255,255,0.05); border-radius: 8px;
  padding: 7px 10px; border: 1px solid #333;
}
.sidebar-player.me { border-color: var(--gold); }
.sidebar-player .sp-name { font-size: 13px; font-weight: 600; color: #eee; }
.sidebar-player .sp-chips { font-size: 12px; color: var(--gold); }
.sidebar-player .sp-status { font-size: 11px; color: #888; }

/* ── 消息栏 ── */
#msgBar {
  position: fixed; bottom: 75px; left: 10px;
  background: var(--ui-bg); border-radius: 10px; padding: 8px 14px;
  font-size: 12px; color: #ccc; max-width: 280px;
  max-height: 80px; overflow: hidden;
  line-height: 1.8; pointer-events: none;
}

/* ── 动画 ── */
@keyframes dealIn {
  from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
  to   { opacity: 1; transform: scale(1) rotate(0deg); }
}
.card { animation: dealIn 0.25s ease; }

@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
#winnerBanner { animation: fadeSlide 0.3s ease; }

/* 移动端适配 */
@media (max-width: 700px) {
  #sidebar { display: none; }
  .card { width: 28px; height: 40px; font-size: 10px; }
  .card.community { width: 38px; height: 54px; font-size: 12px; }
}
</style>
</head>
<body>

<!-- 登录界面 -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🃏 Texas Hold'em</h1>
    <p>多人联机德州扑克</p>
    <input id="nameInput" placeholder="你的昵称" maxlength="12">
    <input id="roomInput" placeholder="房间号（默认 1）" value="1">
    <button onclick="joinGame()">进入游戏</button>
  </div>
</div>

<!-- 游戏主区域 -->
<div id="gameArea">
  <!-- 顶栏 -->
  <div id="topBar">
    <div class="room-info">房间 <span id="roomLabel">-</span> &nbsp;|&nbsp; 玩家 <span id="nameLabel">-</span></div>
    <div class="phase-badge" id="phaseBadge">等待开始</div>
    <button id="startBtn" onclick="startGame()">开始游戏</button>
    <button id="leaveBtn" onclick="leaveRoom()">退出房间</button>
  </div>

  <!-- 牌桌 -->
  <div id="tableWrap">
    <div id="table">
      <!-- 底池 -->
      <div id="potArea">
        <div id="potLabel">底 池</div>
        <div id="potAmount">0</div>
      </div>
      <!-- 公共牌 -->
      <div id="communityCards"></div>
      <!-- 赢家公告 -->
      <div id="winnerBanner">
        <div class="win-title">🏆 本局结果</div>
        <div class="win-detail" id="winnerDetail"></div>
      </div>
      <!-- 座位由JS动态生成 -->
    </div>
  </div>

  <!-- 操作区 -->
  <div id="actionArea">
    <div class="my-info">
      <div class="info-item"><div class="info-label">我的筹码</div><div class="info-val" id="myChips">-</div></div>
      <div class="info-item"><div class="info-label">当前下注</div><div class="info-val" id="myBet">-</div></div>
      <div class="info-item"><div class="info-label">底注</div><div class="info-val">50/100</div></div>
    </div>
    <span id="waitMsg">等待开始...</span>
    <button class="action-btn btn-fold"  id="btnFold"  onclick="act('fold')"  disabled>弃牌</button>
    <button class="action-btn btn-check" id="btnCheck" onclick="act('check')" disabled>过牌</button>
    <button class="action-btn btn-call"  id="btnCall"  onclick="act('call')"  disabled>跟注</button>
    <input  id="raiseInput" type="number" placeholder="加注额" min="100" step="100" value="200">
    <button class="action-btn btn-raise" id="btnRaise" onclick="actRaise()"   disabled>加注</button>
    <button class="action-btn btn-allin" id="btnAllin" onclick="act('allin')" disabled>全押</button>
  </div>
</div>

<!-- 侧栏 -->
<div id="sidebar">
  <h3>玩家列表</h3>
  <div id="playerList"></div>
</div>

<!-- 消息栏 -->
<div id="msgBar"></div>

<script>
// ─────────────────────────────────────────────
// 连接
// ─────────────────────────────────────────────
let socket, myId, myName, myRoomId;
let state = null;

function joinGame() {
  myName = document.getElementById('nameInput').value.trim() || '匿名';
  myRoomId = document.getElementById('roomInput').value.trim() || '1';

  socket = io();
  socket.on('connect', () => {
    myId = socket.id;
    socket.emit('joinRoom', { roomId: myRoomId, name: myName });
  });

  socket.on('joinError', (msg) => {
    // 加入失败：重新显示登录框提示错误
    socket.disconnect();
    socket = null;
    const loginScreen = document.getElementById('loginScreen');
    loginScreen.style.display = '';
    document.getElementById('gameArea').style.display = 'none';
    let errEl = document.getElementById('loginError');
    if (!errEl) {
      errEl = document.createElement('p');
      errEl.id = 'loginError';
      errEl.style.cssText = 'color:#e74c3c;margin:8px 0 0;font-size:14px;';
      loginScreen.querySelector('.login-box').appendChild(errEl);
    }
    errEl.textContent = '⚠️ ' + msg;
  });

  socket.on('gameState', (s) => {
    // 第一次收到 state 说明加入成功
    if (!document.getElementById('gameArea').style.display ||
        document.getElementById('gameArea').style.display === 'none') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('gameArea').style.display = 'flex';
      document.getElementById('roomLabel').textContent = myRoomId;
      document.getElementById('nameLabel').textContent = myName;
      addMsg(`已加入房间 ${myRoomId}`);
    }
    state = s;
    render(s);
  });

  socket.on('leftRoom', () => {
    // 服务端确认退出，返回登录界面
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('loginScreen').style.display = '';
    const errEl = document.getElementById('loginError');
    if (errEl) errEl.textContent = '';
    addMsg('已退出房间');
    state = null;
  });

  socket.on('playerJoined', ({name}) => addMsg(`${name} 加入了房间`));
  socket.on('playerLeft',   ({name}) => addMsg(`${name} 离开了游戏`));
  socket.on('error', (msg) => addMsg('⚠️ ' + msg));
}

function startGame() {
  socket.emit('startGame');
}

function leaveRoom() {
  if (!socket) return;
  socket.emit('leaveRoom');
}
function act(action) {
  socket.emit('action', { action });
}
function actRaise() {
  const amt = parseInt(document.getElementById('raiseInput').value) || 200;
  socket.emit('action', { action: 'raise', amount: amt });
}

// ─────────────────────────────────────────────
// 渲染
// ─────────────────────────────────────────────
const PHASE_NAMES = {
  waiting:'等待开始', preflop:'翻牌前', flop:'翻牌',
  turn:'转牌', river:'河牌', showdown:'摊牌'
};

function render(s) {
  // 阶段标签
  document.getElementById('phaseBadge').textContent = PHASE_NAMES[s.phase] || s.phase;
  // 底池
  document.getElementById('potAmount').textContent = s.pot.toLocaleString();
  // 开始按钮：只有房主且在 waiting 阶段且至少2人时可用
  const startBtn = document.getElementById('startBtn');
  const isHost = s.hostId === myId;
  const canStart = s.phase === 'waiting' && s.players.filter(p=>p.connected).length >= 2;
  startBtn.style.display = isHost ? '' : 'none';
  startBtn.disabled = !canStart;
  startBtn.title = isHost ? (canStart ? '点击开始游戏' : '至少需要2名玩家') : '';

  // 公共牌
  renderCommunity(s.community);

  // 座位
  renderSeats(s);

  // 操作按钮
  renderActions(s);

  // 侧栏
  renderSidebar(s);

  // 赢家公告
  if (s.phase === 'showdown' && s.lastWinners && s.lastWinners.length > 0) {
    showWinners(s.lastWinners);
  } else {
    document.getElementById('winnerBanner').style.display = 'none';
  }
}

function renderCommunity(cards) {
  const el = document.getElementById('communityCards');
  el.innerHTML = '';
  for (const c of cards) {
    el.appendChild(makeCardEl(c, true));
  }
  // 占位
  for (let i = cards.length; i < 5; i++) {
    const ph = document.createElement('div');
    ph.style.cssText = `width:48px;height:68px;border-radius:5px;border:1px dashed #2a5a3a;`;
    el.appendChild(ph);
  }
}

function makeCardEl(card, big=false) {
  const el = document.createElement('div');
  el.className = 'card' + (big?' community':'');
  if (!card || card === '?') {
    el.classList.add('back');
    return el;
  }
  const r = card.r, s = card.s;
  const isRed = s === '♥' || s === '♦';
  el.classList.add(isRed ? 'red' : 'black');
  el.innerHTML = `<span class="card-rank">${r}</span><span class="card-suit">${s}</span>`;
  return el;
}

// 椭圆座位布局
function seatPositions(total) {
  // 返回 {x%, y%} 百分比，围绕椭圆
  const positions = [];
  for (let i = 0; i < total; i++) {
    const angle = (2 * Math.PI * i / total) - Math.PI / 2;
    const x = 50 + 44 * Math.cos(angle);
    const y = 50 + 42 * Math.sin(angle);
    positions.push({ x, y });
  }
  return positions;
}

function renderSeats(s) {
  const table = document.getElementById('table');
  // 删除旧座位
  table.querySelectorAll('.seat').forEach(e=>e.remove());

  const positions = seatPositions(s.players.length);
  const me = s.players.find(p=>p.id===myId);

  s.players.forEach((p, i) => {
    const pos = positions[i];
    const seat = document.createElement('div');
    seat.className = 'seat' +
      (p.id === s.currentPlayerId ? ' active' : '') +
      (p.folded ? ' folded' : '');
    seat.style.left = pos.x + '%';
    seat.style.top  = pos.y + '%';

    // 手牌
    const cardRow = document.createElement('div');
    cardRow.className = 'seat-card-row';
    if (p.cards && p.cards.length === 2) {
      for (const c of p.cards) cardRow.appendChild(makeCardEl(c==='?'?null:c));
    }
    seat.appendChild(cardRow);

    // 信息框
    const info = document.createElement('div');
    info.className = 'seat-info';
    const isMe = p.id === myId;
    info.innerHTML = `
      <div class="seat-name">${isMe?'🎯':''} ${escHtml(p.name)}</div>
      <div class="seat-chips">💰 ${p.chips.toLocaleString()}</div>
      <div class="seat-bet">${p.bet>0?('下注: '+p.bet):''} ${p.allIn?'<b style="color:#ff6060">全押</b>':''} ${p.folded?'<span style="color:#888">弃牌</span>':''}</div>
    `;
    seat.appendChild(info);

    // 牌型名称
    if (p.handName) {
      const hn = document.createElement('div');
      hn.className = 'hand-name';
      hn.textContent = p.handName;
      seat.appendChild(hn);
    }

    // 庄家按钮
    if (p.isDealer) {
      const d = document.createElement('div');
      d.className = 'dealer-btn'; d.textContent = 'D';
      info.style.position = 'relative';
      info.appendChild(d);
    }
    table.appendChild(seat);
  });

  // 自己信息
  if (me) {
    document.getElementById('myChips').textContent = me.chips.toLocaleString();
    document.getElementById('myBet').textContent = me.bet;
  }
}

function renderActions(s) {
  const isMyTurn = s.currentPlayerId === myId && s.phase !== 'waiting' && s.phase !== 'showdown';
  const me = s.players.find(p=>p.id===myId);

  document.getElementById('waitMsg').style.display = isMyTurn ? 'none' : '';
  document.getElementById('waitMsg').textContent = s.phase==='waiting' ? '等待开始...' : (isMyTurn?'':
    (s.currentPlayerId ? `等待 ${s.players.find(p=>p.id===s.currentPlayerId)?.name||'?'} 行动...` : ''));

  const canCheck = isMyTurn && me && me.bet >= s.currentBet;
  const canCall  = isMyTurn && me && me.bet < s.currentBet && me.chips > 0;
  const callAmt  = me ? Math.min(s.currentBet - (me.bet||0), me.chips||0) : 0;

  document.getElementById('btnFold').disabled  = !isMyTurn;
  document.getElementById('btnCheck').disabled = !canCheck;
  document.getElementById('btnCall').disabled  = !canCall;
  document.getElementById('btnRaise').disabled = !isMyTurn;
  document.getElementById('btnAllin').disabled = !isMyTurn;

  // 跟注按钮显示金额
  document.getElementById('btnCall').textContent = canCall ? `跟注 ${callAmt}` : '跟注';
}

function renderSidebar(s) {
  const el = document.getElementById('playerList');
  el.innerHTML = '';
  for (const p of s.players) {
    const div = document.createElement('div');
    div.className = 'sidebar-player' + (p.id===myId?' me':'');
    let status = p.folded?'弃牌':p.allIn?'全押':'等待';
    if (p.id === s.currentPlayerId) status = '⚡ 行动中';
    div.innerHTML = `
      <div class="sp-name">${escHtml(p.name)}</div>
      <div class="sp-chips">💰 ${p.chips.toLocaleString()}</div>
      <div class="sp-status">${status}</div>
    `;
    el.appendChild(div);
  }
}

function showWinners(winners) {
  const banner = document.getElementById('winnerBanner');
  const detail = document.getElementById('winnerDetail');
  banner.style.display = 'block';
  detail.innerHTML = winners.map(w =>
    `🏆 <b>${escHtml(w.name)}</b> 赢得 <b style="color:var(--gold)">${w.amount.toLocaleString()}</b> 筹码<br><small>${w.handName}</small>`
  ).join('<hr style="border-color:#333;margin:4px 0">');
}

// 消息栏
const msgs = [];
function addMsg(text) {
  msgs.push(text);
  if (msgs.length > 4) msgs.shift();
  document.getElementById('msgBar').innerHTML = msgs.map(m=>`<div>${m}</div>`).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 回车加入
document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('loginScreen').style.display!=='none') joinGame();
});
</script>
</body>
</html>
