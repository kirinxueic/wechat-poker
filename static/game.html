<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>德州扑克 - 游戏桌</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --felt: #1a5c2a;
  --felt-dark: #134520;
  --gold: #f5c842;
  --gold2: #e8a020;
  --card-red: #e03030;
  --card-bg: #fff;
  --bg: #0a1628;
}
body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'PingFang SC', Arial, sans-serif;
  color: #fff;
  overflow-x: hidden;
}

/* ── Header ── */
.header {
  background: rgba(0,0,0,0.5);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.header .room-info { font-size: 0.8em; color: #a0b4cc; }
.header .room-id { font-size: 1.1em; font-weight: 700; color: var(--gold); }
.share-btn {
  background: var(--gold);
  color: #1a1a1a;
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 0.85em;
  font-weight: 700;
  cursor: pointer;
}

/* ── Table ── */
.table-wrap {
  display: flex;
  justify-content: center;
  padding: 12px;
}
.table {
  width: 100%;
  max-width: 460px;
  background: radial-gradient(ellipse at center, #2a7a3e 0%, var(--felt) 60%, var(--felt-dark) 100%);
  border-radius: 50%;
  border: 6px solid #8B6914;
  box-shadow: 0 0 0 3px #c8a040, inset 0 0 40px rgba(0,0,0,0.4), 0 20px 60px rgba(0,0,0,0.8);
  aspect-ratio: 1;
  position: relative;
  max-height: 340px;
}
/* Community cards in center */
.community {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.community-cards {
  display: flex;
  gap: 5px;
}
.pot-info {
  font-size: 0.9em;
  font-weight: 700;
  color: var(--gold);
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}
.phase-badge {
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 0.75em;
  color: #fff;
}

/* ── Cards ── */
.card {
  width: 34px;
  height: 50px;
  background: var(--card-bg);
  border-radius: 5px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 0.85em;
  font-weight: 900;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  position: relative;
  color: #333;
  line-height: 1;
  transition: transform 0.3s;
}
.card.red { color: var(--card-red); }
.card.hidden {
  background: linear-gradient(135deg, #1a3a6a, #0d2040);
  color: transparent;
  border: 1px solid rgba(255,255,255,0.2);
}
.card.hidden::after {
  content: '🂠';
  font-size: 1.5em;
  position: absolute;
}
.card .rank { font-size: 1em; }
.card .suit { font-size: 0.9em; margin-top: -2px; }
.card-sm {
  width: 26px;
  height: 38px;
  font-size: 0.7em;
  border-radius: 4px;
}

/* ── Player seats ── */
.seat {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 80px;
}
.avatar-wrap {
  position: relative;
  margin-bottom: 4px;
}
.avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  background: #2a3a5a;
  object-fit: cover;
}
.avatar.active { border-color: var(--gold); box-shadow: 0 0 12px var(--gold); }
.avatar.folded { opacity: 0.4; filter: grayscale(1); }
.dealer-btn {
  position: absolute;
  top: -4px;
  right: -4px;
  background: var(--gold);
  color: #1a1a1a;
  border-radius: 50%;
  width: 16px;
  height: 16px;
  font-size: 0.6em;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
}
.player-name {
  font-size: 0.7em;
  font-weight: 700;
  white-space: nowrap;
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
  text-shadow: 0 1px 3px rgba(0,0,0,0.9);
}
.player-chips {
  font-size: 0.65em;
  color: var(--gold);
  text-shadow: 0 1px 3px rgba(0,0,0,0.9);
}
.player-bet {
  font-size: 0.6em;
  color: #8df;
  background: rgba(0,0,0,0.5);
  padding: 1px 5px;
  border-radius: 8px;
}
.player-cards {
  display: flex;
  gap: 2px;
  margin-top: 2px;
}
.all-in-badge {
  background: #e03030;
  color: #fff;
  font-size: 0.55em;
  padding: 1px 5px;
  border-radius: 8px;
  font-weight: 700;
}
.timer-bar {
  width: 38px;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  margin-top: 2px;
}
.timer-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  transition: width 1s linear;
}

/* Seat positions around the oval (for up to 9 seats) */
/* Positions are percentage from center */
.seat-0  { top: 82%; left: 50%; transform: translate(-50%, -50%); }
.seat-1  { top: 70%; left: 18%; transform: translate(-50%, -50%); }
.seat-2  { top: 40%; left: 5%;  transform: translate(-50%, -50%); }
.seat-3  { top: 15%; left: 18%; transform: translate(-50%, -50%); }
.seat-4  { top: 5%;  left: 50%; transform: translate(-50%, -50%); }
.seat-5  { top: 15%; left: 82%; transform: translate(-50%, -50%); }
.seat-6  { top: 40%; left: 95%; transform: translate(-50%, -50%); }
.seat-7  { top: 70%; left: 82%; transform: translate(-50%, -50%); }
.seat-8  { top: 82%; left: 70%; transform: translate(-50%, -50%); }

/* ── Actions ── */
.actions-panel {
  padding: 12px 16px;
  max-width: 460px;
  margin: 0 auto;
}
.action-btns {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.action-btn {
  padding: 14px 8px;
  border: none;
  border-radius: 12px;
  font-size: 0.95em;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-fold { background: rgba(200,60,60,0.8); color: #fff; }
.btn-check { background: rgba(60,140,200,0.8); color: #fff; }
.btn-call { background: rgba(60,160,80,0.8); color: #fff; }
.btn-raise { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #1a1a1a; }
.btn-allin { background: rgba(200,60,200,0.8); color: #fff; grid-column: span 3; }
.action-btn:disabled { opacity: 0.3; cursor: default; }
.action-btn:not(:disabled):active { transform: scale(0.96); }
.raise-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.raise-row input[type="range"] {
  flex: 1;
  accent-color: var(--gold);
}
.raise-amount {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  padding: 6px 10px;
  color: var(--gold);
  font-weight: 700;
  min-width: 70px;
  text-align: center;
  font-size: 0.9em;
}

/* ── Ready overlay ── */
.ready-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.ready-overlay.show { display: flex; }
.ready-card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  backdrop-filter: blur(20px);
  max-width: 300px;
  width: 90%;
}
.ready-card h2 { font-size: 1.4em; margin-bottom: 10px; }
.ready-card p { color: #a0b4cc; font-size: 0.9em; margin-bottom: 20px; }
.btn-ready {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #1a1a1a;
  border: none;
  border-radius: 12px;
  padding: 14px 40px;
  font-size: 1.1em;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
}
.players-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
}
.player-chip {
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.85em;
}
.player-chip.ready { background: rgba(60,200,80,0.3); color: #4ec860; }

/* ── Log ── */
.log-panel {
  max-width: 460px;
  margin: 0 auto 16px;
  padding: 0 16px;
}
.log-scroll {
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  padding: 10px;
  max-height: 80px;
  overflow-y: auto;
  font-size: 0.78em;
  color: #a0b4cc;
}
.log-scroll p { margin-bottom: 2px; }
.log-scroll p.win { color: var(--gold); font-weight: 700; }

/* ── Showdown popup ── */
.showdown-popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.showdown-popup.show { display: flex; }
.showdown-card {
  background: linear-gradient(135deg, #1a2744, #0a1628);
  border: 2px solid var(--gold);
  border-radius: 20px;
  padding: 28px;
  text-align: center;
  max-width: 320px;
  width: 90%;
  box-shadow: 0 0 40px rgba(245,200,66,0.3);
}
.showdown-card h2 { color: var(--gold); font-size: 1.5em; margin-bottom: 16px; }
.winner-item { margin-bottom: 12px; font-size: 1.05em; }
.winner-item .chips { color: #4ec860; font-weight: 700; }

/* ── Name input ── */
.name-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
.name-overlay.show { display: flex; }
.name-card {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  width: 90%;
  max-width: 300px;
}
.name-card h2 { margin-bottom: 16px; }
.name-card input {
  width: 100%;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  padding: 12px;
  color: #fff;
  font-size: 1em;
  margin-bottom: 12px;
  outline: none;
}
.name-card button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #1a1a1a;
  border: none;
  border-radius: 10px;
  font-size: 1em;
  font-weight: 700;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- Name Input Overlay -->
<div class="name-overlay" id="nameOverlay">
  <div class="name-card">
    <h2>👋 欢迎入座</h2>
    <input type="text" id="nameInput" placeholder="输入你的昵称" maxlength="12">
    <button onclick="confirmName()">进入牌桌</button>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div>
    <div class="room-info">房间号</div>
    <div class="room-id" id="headerRoomId">------</div>
  </div>
  <button class="share-btn" onclick="shareRoom()">📤 分享链接</button>
</div>

<!-- Table -->
<div class="table-wrap">
  <div class="table" id="pokerTable">
    <div class="community">
      <div class="phase-badge" id="phaseBadge">等待开始</div>
      <div class="community-cards" id="communityCards"></div>
      <div class="pot-info" id="potInfo"></div>
    </div>
    <!-- Seats injected by JS -->
  </div>
</div>

<!-- Log -->
<div class="log-panel">
  <div class="log-scroll" id="gameLog"></div>
</div>

<!-- Action Panel -->
<div class="actions-panel" id="actionsPanel" style="display:none">
  <div class="raise-row">
    <span style="font-size:0.8em;color:#a0b4cc">加注</span>
    <input type="range" id="raiseSlider" min="0" max="1000" value="100" oninput="updateRaise(this.value)">
    <div class="raise-amount" id="raiseAmt">100</div>
  </div>
  <div class="action-btns">
    <button class="action-btn btn-fold" id="btnFold" onclick="doAction('fold')">弃牌</button>
    <button class="action-btn btn-check" id="btnCheck" onclick="doAction('check')">过牌</button>
    <button class="action-btn btn-call" id="btnCall" onclick="doAction('call')">跟注</button>
    <button class="action-btn btn-raise" onclick="doAction('raise')">加注</button>
    <button class="action-btn btn-allin" onclick="doAction('allin')">⚡ All In</button>
  </div>
</div>

<!-- Ready Overlay -->
<div class="ready-overlay" id="readyOverlay">
  <div class="ready-card">
    <h2>🃏 等待开始</h2>
    <p>等待所有玩家准备</p>
    <div class="players-list" id="playersList"></div>
    <button class="btn-ready" id="readyBtn" onclick="doReady()">✋ 我准备好了</button>
  </div>
</div>

<!-- Showdown Popup -->
<div class="showdown-popup" id="showdownPopup">
  <div class="showdown-card">
    <h2>🏆 本局结算</h2>
    <div id="winnersDiv"></div>
    <p style="color:#a0b4cc;font-size:0.85em;margin-top:16px">5秒后自动进入下一局...</p>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const ROOM_ID = location.pathname.split('/').pop();
const API = location.origin;
let MY_ID = params.get('pid') || localStorage.getItem('poker_player_id');
let MY_NAME = localStorage.getItem('poker_name') || '';
let isHost = params.get('host') === '1';

if (!MY_ID) {
  MY_ID = 'p_' + Math.random().toString(36).substr(2, 9);
  localStorage.setItem('poker_player_id', MY_ID);
}

let ws = null;
let gameState = null;
let raiseValue = 20;
let myReady = false;

// ── Init ──────────────────────────────────────────────────────────────────

document.getElementById('headerRoomId').textContent = ROOM_ID;
document.title = `德州扑克 - ${ROOM_ID}`;

if (!MY_NAME) {
  document.getElementById('nameOverlay').classList.add('show');
  document.getElementById('nameInput').value = '';
} else {
  connect();
}

function confirmName() {
  const n = document.getElementById('nameInput').value.trim();
  if (!n) return;
  MY_NAME = n;
  localStorage.setItem('poker_name', n);
  document.getElementById('nameOverlay').classList.remove('show');
  connect();
}

// ── WebSocket ─────────────────────────────────────────────────────────────

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/${ROOM_ID}/${MY_ID}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ action: 'set_name', name: MY_NAME }));
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };

  ws.onclose = () => {
    setTimeout(connect, 2000);
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'game_state':
      gameState = msg.data;
      renderState();
      break;
    case 'showdown':
      showShowdown(msg.winners, msg.history);
      break;
    case 'system':
      addLog(msg.msg);
      break;
    case 'player_joined':
      addLog(`👋 ${msg.name} 加入房间`);
      break;
    case 'player_left':
      addLog(`👋 ${msg.msg}`);
      break;
    case 'error':
      addLog(`❌ ${msg.msg}`);
      break;
  }
}

// ── Render ────────────────────────────────────────────────────────────────

function renderState() {
  if (!gameState) return;
  const { phase, pot, community_cards, players, current_player_id, dealer_idx, winners } = gameState;

  // Phase badge
  const phaseNames = { waiting:'等待开始', preflop:'翻牌前', flop:'翻牌', turn:'转牌', river:'河牌', showdown:'摊牌' };
  document.getElementById('phaseBadge').textContent = phaseNames[phase] || phase;
  document.getElementById('potInfo').textContent = pot > 0 ? `底池: ${pot}` : '';

  // Community cards
  const ccEl = document.getElementById('communityCards');
  ccEl.innerHTML = community_cards.map(c => cardHtml(c)).join('');

  // Players / seats
  renderSeats(players, current_player_id, dealer_idx);

  // My action
  const me = players.find(p => p.id === MY_ID);
  const isMyTurn = current_player_id === MY_ID && phase !== 'waiting' && phase !== 'showdown';
  const actionsEl = document.getElementById('actionsPanel');

  if (isMyTurn && me && !me.folded && !me.all_in) {
    actionsEl.style.display = 'block';
    const canCheck = me.bet >= gameState.current_bet;
    document.getElementById('btnCheck').disabled = !canCheck;
    document.getElementById('btnCall').disabled = canCheck;
    const callAmt = gameState.current_bet - me.bet;
    document.getElementById('btnCall').textContent = `跟注 ${callAmt}`;
    // Raise slider
    const minRaise = Math.max(gameState.current_bet * 2, gameState.big_blind);
    const maxRaise = me.chips + me.bet;
    const slider = document.getElementById('raiseSlider');
    slider.min = minRaise;
    slider.max = maxRaise;
    if (raiseValue < minRaise) raiseValue = minRaise;
    slider.value = raiseValue;
    document.getElementById('raiseAmt').textContent = raiseValue;
  } else {
    actionsEl.style.display = 'none';
  }

  // Ready overlay
  if (phase === 'waiting') {
    if (!myReady) {
      document.getElementById('readyOverlay').classList.add('show');
    }
    // Show player list
    const pl = document.getElementById('playersList');
    pl.innerHTML = players.map(p =>
      `<span class="player-chip ${p.is_ready ? 'ready' : ''}">${p.name}${p.is_ready ? ' ✓' : ''}</span>`
    ).join('');
  } else {
    document.getElementById('readyOverlay').classList.remove('show');
  }
}

function renderSeats(players, currentId, dealerIdx) {
  const table = document.getElementById('pokerTable');
  // Remove old seats
  table.querySelectorAll('.seat').forEach(s => s.remove());

  players.forEach((p, i) => {
    const seat = document.createElement('div');
    seat.className = `seat seat-${i}`;
    const isActive = p.id === currentId;
    const isDealer = i === dealerIdx;

    seat.innerHTML = `
      <div class="avatar-wrap">
        <img class="avatar ${isActive ? 'active' : ''} ${p.folded ? 'folded' : ''}"
          src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${p.id}" onerror="this.style.background='#2a4a7a'">
        ${isDealer ? '<div class="dealer-btn">D</div>' : ''}
      </div>
      <div class="player-name">${p.name}${p.id === MY_ID ? ' (我)' : ''}</div>
      <div class="player-chips">${p.chips}💰</div>
      ${p.bet > 0 ? `<div class="player-bet">下注:${p.bet}</div>` : ''}
      ${p.all_in ? '<div class="all-in-badge">ALL IN</div>' : ''}
      <div class="player-cards">
        ${(p.cards || []).map(c => cardHtml(c, true)).join('')}
      </div>
      ${isActive ? '<div class="timer-bar"><div class="timer-fill" style="width:100%" id="timerFill"></div></div>' : ''}
    `;
    table.appendChild(seat);
  });
}

function cardHtml(c, small = false) {
  if (c.hidden) return `<div class="card ${small ? 'card-sm' : ''} hidden"></div>`;
  const isRed = c.suit === '♥' || c.suit === '♦';
  return `<div class="card ${small ? 'card-sm' : ''} ${isRed ? 'red' : ''}">
    <div class="rank">${c.rank}</div>
    <div class="suit">${c.suit}</div>
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────

function doAction(action) {
  const payload = { action };
  if (action === 'raise') {
    payload.amount = parseInt(document.getElementById('raiseSlider').value);
  }
  ws.send(JSON.stringify(payload));
}

function doReady() {
  myReady = true;
  document.getElementById('readyBtn').disabled = true;
  document.getElementById('readyBtn').textContent = '✅ 已准备';
  ws.send(JSON.stringify({ action: 'ready' }));
}

function updateRaise(v) {
  raiseValue = parseInt(v);
  document.getElementById('raiseAmt').textContent = v;
}

// ── Showdown ──────────────────────────────────────────────────────────────

function showShowdown(winners, history) {
  const div = document.getElementById('winnersDiv');
  div.innerHTML = winners.map(w =>
    `<div class="winner-item">🏆 ${w.name} <span class="chips">+${w.gain}</span> (${w.hand || '最后存活'})</div>`
  ).join('');
  document.getElementById('showdownPopup').classList.add('show');
  // History
  if (history) history.forEach(h => addLog(h, h.includes('赢得')));
  setTimeout(() => {
    document.getElementById('showdownPopup').classList.remove('show');
    myReady = false;
  }, 5000);
}

// ── Utility ───────────────────────────────────────────────────────────────

function addLog(msg, isWin = false) {
  const log = document.getElementById('gameLog');
  const p = document.createElement('p');
  if (isWin) p.className = 'win';
  p.textContent = msg;
  log.appendChild(p);
  log.scrollTop = log.scrollHeight;
}

function shareRoom() {
  const url = location.origin + '/game/' + ROOM_ID;
  if (navigator.share) {
    navigator.share({ title: '德州扑克', text: `加入我的牌桌！房间号: ${ROOM_ID}`, url });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url);
    alert('链接已复制！分享给群友');
  } else {
    prompt('复制链接:', url);
  }
}
</script>
